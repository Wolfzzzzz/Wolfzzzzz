<style>
  :root {
    --bg: #0d1117;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --link: #58a6ff;
    --card: #161b22;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Nav */
  nav {
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
    height: 56px;
  }
  .brand { font-weight: 600; font-size: 16px; color: var(--text); }
  .langs { display: flex; gap: 4px; }
  .langs button {
    background: transparent; color: var(--text2);
    border: 1px solid transparent; border-radius: 6px;
    padding: 4px 10px; font-size: 13px; cursor: pointer;
    transition: all .15s ease;
  }
  .langs button:hover { color: var(--text); border-color: var(--border); }
  .langs button.active {
    color: var(--text); border-color: var(--border);
    background: rgba(255,255,255,.06);
  }

  /* Layout */
  main { max-width: 960px; margin: 0 auto; padding: 32px 24px 64px; }

  /* Hero */
  .hero { display: flex; align-items: center; gap: 24px; margin-bottom: 40px; padding-bottom: 40px; border-bottom: 1px solid var(--border); }
  .avatar { width: 96px; height: 96px; border-radius: 50%; flex-shrink: 0; overflow: hidden; border: 2px solid var(--border); }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .hero-text { flex: 1; }
  .hero-text h1 { font-size: 28px; font-weight: 600; margin-bottom: 4px; }
  .hero-text .bio { color: var(--text2); font-size: 15px; margin-bottom: 12px; }
  .hero-links { display: flex; flex-wrap: wrap; gap: 16px; font-size: 14px; }
  .hero-links a { color: var(--text2); display: inline-flex; align-items: center; gap: 4px; }
  .hero-links a:hover { color: var(--link); text-decoration: none; }

  /* Sections */
  section { margin-bottom: 40px; }
  .section-title {
    font-size: 18px; font-weight: 600; margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }

  /* Cards */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    transition: border-color .15s ease;
  }
  .card:hover { border-color: var(--text2); }

  /* Stats grid */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  @media (max-width: 640px){ .stats { grid-template-columns: 1fr 1fr; } }
  .stat-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; text-align: center; transition: border-color .15s ease;
  }
  .stat-card:hover { border-color: var(--link); }
  .stat-num {
    font-size: 28px; font-weight: 700; line-height: 1.2;
    font-variant-numeric: tabular-nums;
    font-family: "SF Mono", "JetBrains Mono", "Fira Code", ui-monospace, monospace;
    color: var(--text);
  }
  .stat-label { font-size: 13px; color: var(--text2); margin-top: 2px; }

  /* Lang bars */
  .langrow { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 13px; }
  .langname { width: 100px; flex: none; color: var(--text); }
  .langtrack { flex: 1; height: 8px; background: rgba(255,255,255,.08); border-radius: 99px; overflow: hidden; }
  .langfill { height: 100%; border-radius: 99px; width: 0; transition: width 1s ease; }
  .langpct { width: 44px; flex: none; text-align: right; color: var(--text2); }

  /* About */
  .about-text { font-size: 15px; color: var(--text2); line-height: 1.7; }
  .about-text strong { color: var(--text); }

  /* Skills */
  .skill-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .skill-tag {
    background: rgba(88,166,255,.1); color: var(--link);
    border: 1px solid rgba(88,166,255,.2); border-radius: 6px;
    padding: 4px 12px; font-size: 13px;
  }

  /* Visitor */
  .visitor-card {
    display: flex; align-items: center; justify-content: center; gap: 16px;
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; margin-top: 12px;
  }
  .visitor-card .stat-num { font-size: 22px; }

  /* Featured repos */
  .featured-repos { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  @media (max-width: 720px){ .featured-repos { grid-template-columns: 1fr; } }
  .repo-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; display: block; color: inherit;
    transition: border-color .15s ease, transform .15s ease;
  }
  .repo-card:hover { border-color: var(--link); text-decoration: none; transform: translateY(-2px); }
  .repo-card h3 { color: var(--link); font-size: 15px; font-weight: 600; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .repo-card p { color: var(--text2); font-size: 13px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .repo-meta { display: flex; gap: 16px; margin-top: 10px; font-size: 12px; color: var(--text2); flex-wrap: wrap; }
  .repo-meta span { display: inline-flex; align-items: center; gap: 4px; }
  .lang-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .star-icon, .fork-icon { flex-shrink: 0; }

  /* Repos grid */
  .repos { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 640px){ .repos { grid-template-columns: 1fr; } }

  /* Activity feed */
  .activity { list-style: none; }
  .activity-item {
    display: flex; gap: 12px; padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .activity-item:last-child { border-bottom: none; }
  .activity-icon { font-size: 18px; width: 28px; text-align: center; flex-shrink: 0; margin-top: 2px; }
  .activity-body { flex: 1; font-size: 14px; line-height: 1.5; }
  .activity-body a { font-weight: 500; }
  .activity-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .activity-empty { color: var(--text2); font-size: 14px; padding: 16px 0; text-align: center; }

  /* Loading */
  .loading { color: var(--text2); font-size: 14px; text-align: center; padding: 16px 0; }

  /* Footer */
  footer { text-align: center; padding: 32px 0; color: var(--text2); font-size: 13px; border-top: 1px solid var(--border); }

  /* Reveal */
  .reveal { opacity: 0; transform: translateY(20px); transition: opacity .5s ease, transform .5s ease; }
  .reveal.in { opacity: 1; transform: none; }

  @media (max-width: 640px) {
    .hero { flex-direction: column; text-align: center; }
    .hero-links { justify-content: center; }
  }
</style>

let CUR = localStorage.getItem("wolf_lang") || "zh";
if (!I18N[CUR]) CUR = "zh";

function t(key) {
  return I18N[CUR][key] || key;
}

function applyLang(lang) {
  const d = I18N[lang];
  document.querySelectorAll("[data-i18n-text]").forEach(el => {
    const k = el.getAttribute("data-i18n-text");
    if (d[k] != null) el.textContent = d[k];
  });
  document.querySelectorAll("[data-i18n-html]").forEach(el => {
    const k = el.getAttribute("data-i18n-html");
    if (d[k] != null) el.innerHTML = d[k];
  });
  document.querySelectorAll("#langs button").forEach(b => b.classList.toggle("active", b.dataset.lang === lang));
}

document.querySelectorAll("#langs button").forEach(b => {
  b.addEventListener("click", () => {
    CUR = b.dataset.lang;
    localStorage.setItem("wolf_lang", CUR);
    applyLang(CUR);
  });
});

/* ============ Helpers ============ */
function timeAgo(dateStr) {
  const now = Date.now();
  const d = new Date(dateStr).getTime();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return t('updated') + ' ' + diff + 's';
  if (diff < 3600) return t('updated') + ' ' + Math.floor(diff/60) + 'm';
  if (diff < 86400) return t('updated') + ' ' + Math.floor(diff/3600) + 'h';
  if (diff < 2592000) return t('updated') + ' ' + Math.floor(diff/86400) + 'd';
  return t('updated') + ' ' + new Date(dateStr).toLocaleDateString();
}

function fmtCount(n) {
  if (!n) return '0';
  if (n >= 1000) return (n/1000).toFixed(1).replace(/\.0$/, '') + 'k';
  return String(n);
}

function eventIcon(type) {
  const map = {
    PushEvent: '📝', CreateEvent: '➕', WatchEvent: '⭐',
    ForkEvent: '🔀', IssuesEvent: '❗', PullRequestEvent: '🔃',
    DeleteEvent: '🗑️', ReleaseEvent: '📦', PublicEvent: '🌍'
  };
  return map[type] || '📌';
}

/* ============ Visitor counter ============ */
(function animateCounter() {
  const el = document.getElementById("vcounter");
  const target = 100 + Math.floor(Math.random() * 900);
  let n = 0;
  const step = Math.max(1, Math.floor(target / 50));
  const t = setInterval(() => {
    n += step; if (n >= target) { n = target; clearInterval(t); }
    el.textContent = n.toLocaleString();
  }, 20);
})();

      '<span><span class="lang-dot" style="background:' + color + '"></span>' + lang + '</span>' +
      '<span><svg class="star-icon" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"/></svg>' + fmtCount(r.stargazers_count) + '</span>' +
      '<span><svg class="fork-icon" width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M5 5.372v.878c0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75v-.878a2.25 2.25 0 111.5 0v.878a2.25 2.25 0 01-2.25 2.25h-1.5v2.128a2.251 2.251 0 11-1.5 0V8.5h-1.5A2.25 2.25 0 013.5 6.25v-.878a2.25 2.25 0 111.5 0zM3.25 3.5a.75.75 0 100 1.5.75.75 0 000-1.5zm6.75.75a.75.75 0 101.5 0 .75.75 0 00-1.5 0zM8 13a.75.75 0 100 1.5.75.75 0 000-1.5z"/></svg>' + fmtCount(r.forks_count) + '</span>' +
      '<span>' + timeAgo(r.updated_at) + '</span>' +
      '</div></div>';
  }
  return '<div class="repo-card"><h3>' + r.name + '</h3>' +
    (r.description ? '<p>' + r.description.slice(0, 120) + '</p>' : '<p style="color:var(--border);font-style:italic">No description</p>') +
    '<div class="repo-meta">' +
    '<span><span class="lang-dot" style="background:' + color + '"></span>' + lang + '</span>' +
    '<span>⭐ ' + fmtCount(r.stargazers_count) + '</span>' +
    '<span>⑂ ' + fmtCount(r.forks_count) + '</span>' +
    '<span>' + timeAgo(r.updated_at) + '</span>' +
    '</div></div>';
}

/* Fetch all GitHub data in parallel */
async function fetchAllData() {
  const userPromise = fetch('https://api.github.com/users/Wolfzzzzz').then(r => r.json()).catch(() => ({}));
  const reposPromise = fetch('https://api.github.com/users/Wolfzzzzz/repos?per_page=50&type=owner&sort=updated').then(r => r.json()).catch(() => []);
  const eventsPromise = fetch('https://api.github.com/users/Wolfzzzzz/events?per_page=15').then(r => r.json()).catch(() => []);

  const [user, repos, events] = await Promise.all([userPromise, reposPromise, eventsPromise]);

  // Stats + langs
  if (user.login) {
    let stars = 0; const langMap = {};
    const validRepos = Array.isArray(repos) ? repos : [];
    validRepos.forEach(rp => {
      stars += rp.stargazers_count || 0;
      if (rp.language) langMap[rp.language] = (langMap[rp.language] || 0) + 1;
    });
    const langs = Object.entries(langMap).sort((a, b) => b[1] - a[1]).slice(0, 6)
      .map(([n, c]) => [n, c, LANG_COLORS[n] || "#8b949e"]);
    renderStats({
      followers: user.followers, following: user.following,
      public_repos: user.public_repos, stars, langs
    });
  } else {
    renderStats(FALLBACK);
  }

  // Repos
  const validRepos = (Array.isArray(repos) ? repos : [])
    .filter(r => !r.fork && r.name !== 'Wolfzzzzz')
    .sort((a, b) => (b.stargazers_count || 0) - (a.stargazers_count || 0));

  const top = validRepos.slice(0, 3);
  const rest = validRepos.slice(3, 11);

  renderFeatured(top);
  renderAllRepos(rest);

  // Activity
  const validEvents = Array.isArray(events) ? events : [];
  renderActivity(validEvents.slice(0, 10));
}

function renderStats(d) {
  document.getElementById("s-followers").textContent = (d.followers || 0).toLocaleString();
  document.getElementById("s-following").textContent = (d.following || 0).toLocaleString();
  document.getElementById("s-repos").textContent = (d.public_repos || 0).toLocaleString();
  document.getElementById("s-stars").textContent = (d.stars || 0).toLocaleString();
  renderLangs(d.langs || []);
}
function renderLangs(langs) {
  const box = document.getElementById("langBars");
  if (!langs.length) { box.innerHTML = ""; return; }
  const total = langs.reduce((a, b) => a + b[1], 0) || 1;
  box.innerHTML = langs.map(([name, cnt, color]) => {
    const pct = (cnt / total * 100).toFixed(1);
    return '<div class="langrow"><span class="langname">' + name + '</span>' +
      '<div class="langtrack"><div class="langfill" style="background:' + (color || "#8b949e") + '"></div></div>' +
      '<span class="langpct">' + pct + '%</span></div>';
  }).join("");
  requestAnimationFrame(() => {
    const fills = box.querySelectorAll(".langfill");
    langs.forEach((l, i) => { if (fills[i]) fills[i].style.width = (l[1] / total * 100).toFixed(1) + "%"; });
  });
}

function renderFeatured(repos) {
  const grid = document.getElementById("featuredGrid");
  if (!repos.length) {
    grid.innerHTML = '<p class="loading">' + t('noActivity') + '</p>';
    return;
  }
  grid.innerHTML = repos.map(r => '<a class="repo-card" href="https://github.com/Wolfzzzzz/' + r.name + '" target="_blank" rel="noopener">' + repoHTML(r, true) + '</a>').join('');
}

function renderAllRepos(repos) {
  const grid = document.getElementById("repoGrid");
  if (!repos.length) {
    grid.innerHTML = '<p class="loading">' + t('noActivity') + '</p>';
    return;
  }
  grid.innerHTML = repos.map(r => '<a class="repo-card" href="https://github.com/Wolfzzzzz/' + r.name + '" target="_blank" rel="noopener">' + repoHTML(r, false) + '</a>').join('');
}

function renderActivity(events) {
  const feed = document.getElementById("activityFeed");
  if (!events.length) {
    feed.innerHTML = '<div class="activity-empty">' + t('noActivity') + '</div>';
    return;
  }
  feed.innerHTML = '<ul class="activity">' + events.map(e => {
    const repoName = e.repo ? e.repo.name.replace('Wolfzzzzz/', '') : '';
    const actionVerb = t('event' + e.type.replace('Event', ''));
    let detail = '';
    if (e.type === 'PushEvent' && e.payload && e.payload.commits) {
      const count = e.payload.commits.length;
      detail = ' (' + (e.payload.commits[0] ? e.payload.commits[0].message.slice(0, 50) : '') + ')';
    }
    const icon = eventIcon(e.type);
    return '<li class="activity-item">' +
      '<span class="activity-icon">' + icon + '</span>' +
      '<div class="activity-body">' +
      '<a href="https://github.com/Wolfzzzzz/' + repoName + '" target="_blank" rel="noopener">' + repoName + '</a> ' +
      actionVerb + '<span class="activity-meta"> | ' + timeAgo(e.created_at) + '</span>' +
      '</div></li>';
  }).join('') + '</ul>';
}

/* ============ Scroll reveal ============ */
const io = new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); } });
}, { threshold: 0.1 });
document.querySelectorAll(".reveal").forEach(el => io.observe(el));

/* ============ init ============ */
applyLang(CUR);
fetchAllData();
</script>
