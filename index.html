<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wolf · GitHub Profile</title>
<style>
  :root {
    --bg: #0a0e1a;
    --bg2: #0d1b2a;
    --accent: #58a6ff;
    --accent2: #bc8cff;
    --accent3: #2dd4bf;
    --text: #e6edf3;
    --muted: #8b949e;
    --card: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
    line-height: 1.6;
  }
  #bg {
    position: fixed; inset: 0; z-index: -2;
    background: radial-gradient(ellipse at top, var(--bg2), var(--bg) 70%);
  }
  .glow {
    position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background:
      radial-gradient(circle at 20% 30%, rgba(88,166,255,0.15), transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(188,140,255,0.12), transparent 40%),
      radial-gradient(circle at 50% 90%, rgba(45,212,191,0.10), transparent 45%);
    animation: drift 14s ease-in-out infinite alternate;
  }
  @keyframes drift {
    0% { transform: translate(0,0) scale(1); }
    100% { transform: translate(-3%, 2%) scale(1.08); }
  }

  /* ---------- Nav / Lang switcher ---------- */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px;
    backdrop-filter: blur(14px);
    background: rgba(10,14,26,0.55);
    border-bottom: 1px solid var(--border);
  }
  .brand { font-weight: 700; letter-spacing: 0.5px; font-size: 18px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; background-clip: text; color: transparent; }
  .langs { display: flex; gap: 6px; }
  .langs button {
    background: var(--card); color: var(--muted);
    border: 1px solid var(--border); border-radius: 999px;
    padding: 6px 12px; font-size: 13px; cursor: pointer;
    transition: all .25s ease;
  }
  .langs button:hover { color: var(--text); border-color: var(--accent); transform: translateY(-1px); }
  .langs button.active {
    color: #fff; border-color: transparent;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    box-shadow: 0 4px 18px rgba(88,166,255,0.4);
  }

  /* ---------- Layout ---------- */
  section { max-width: 940px; margin: 0 auto; padding: 90px 24px 40px; }
  .reveal { opacity: 0; transform: translateY(28px); transition: all .7s cubic-bezier(.2,.7,.3,1); }
  .reveal.in { opacity: 1; transform: none; }

  /* ---------- Hero ---------- */
  .hero { min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; padding-top: 60px; }
  .avatar {
    width: 132px; height: 132px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
    padding: 4px; margin-bottom: 22px;
    box-shadow: 0 0 45px rgba(88,166,255,0.5);
    animation: float 5s ease-in-out infinite;
  }
  .avatar img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--bg); object-fit: cover; }
  @keyframes float { 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(-12px);} }
  .hero h1 { font-size: clamp(38px, 8vw, 72px); font-weight: 800; letter-spacing: -1px; }
  .hero h1 span { background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
    -webkit-background-clip: text; background-clip: text; color: transparent; }
  .typed { font-size: clamp(16px, 3vw, 22px); color: var(--muted); margin-top: 12px; min-height: 30px; }
  .typed::after { content: "▋"; color: var(--accent); animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .cta { margin-top: 30px; display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
  .btn {
    padding: 12px 26px; border-radius: 999px; font-weight: 600; font-size: 15px;
    text-decoration: none; cursor: pointer; border: none; transition: all .25s ease;
  }
  .btn.primary { background: linear-gradient(90deg, var(--accent), var(--accent2)); color: #fff;
    box-shadow: 0 8px 24px rgba(88,166,255,0.35); }
  .btn.primary:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(88,166,255,0.5); }
  .btn.ghost { background: var(--card); color: var(--text); border: 1px solid var(--border); }
  .btn.ghost:hover { border-color: var(--accent); transform: translateY(-3px); }

  h2.title { font-size: clamp(26px, 5vw, 36px); margin-bottom: 26px; position: relative; display: inline-block; }
  h2.title::after { content: ""; position: absolute; left: 0; bottom: -8px; width: 60px; height: 4px;
    border-radius: 4px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }

  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 18px;
    padding: 26px; backdrop-filter: blur(10px);
    transition: transform .3s ease, box-shadow .3s ease, border-color .3s ease;
  }
  .card:hover { transform: translateY(-6px) rotateX(4deg) rotateY(-4deg);
    border-color: var(--accent); box-shadow: 0 18px 40px rgba(0,0,0,0.45); }

  .about p { font-size: 17px; color: var(--text); }
  .about .fun { margin-top: 14px; color: var(--muted); font-size: 15px; }

  .badges { display: flex; flex-wrap: wrap; gap: 12px; }
  .badges img { transition: transform .25s ease; }
  .badges img:hover { transform: scale(1.08) translateY(-3px); }

  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 720px){ .stats { grid-template-columns: 1fr; } }
  .stats .card { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .counter { font-size: 34px; font-weight: 800; color: var(--accent);
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; background-clip: text; color: transparent; }

  .repos { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 720px){ .repos { grid-template-columns: 1fr; } }
  .repo { text-decoration: none; color: inherit; }
  .repo .card h3 { color: var(--accent); margin-bottom: 6px; }
  .repo .card p { color: var(--muted); font-size: 14px; }

  .connect { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
  footer { text-align: center; padding: 40px 20px 60px; color: var(--muted); font-size: 14px; }
  footer .heart { color: #ff6b9d; }
</style>
</head>

let CUR = localStorage.getItem("wolf_lang") || "zh";
if (!I18N[CUR]) CUR = "zh";

function applyLang(lang) {
  const d = I18N[lang];
  document.documentElement.lang = (lang === "zh") ? "zh-CN" : (lang === "en") ? "en" : (lang === "tw") ? "zh-TW" : "zh-HK";
  document.querySelectorAll("[data-i18n-text]").forEach(el => {
    const k = el.getAttribute("data-i18n-text");
    if (d[k] != null) el.textContent = d[k];
  });
  document.querySelectorAll("[data-i18n-html]").forEach(el => {
    const k = el.getAttribute("data-i18n-html");
    if (d[k] != null) el.innerHTML = d[k];
  });
  // buttons / dynamic
  document.getElementById("cta-follow").textContent = d.ctaFollow;
  document.getElementById("cta-repos").textContent = d.ctaRepos;
  document.getElementById("connect-dm").textContent = d.connectDM;
  // repos
  const grid = document.getElementById("repoGrid");
  grid.innerHTML = "";
  d.repos.forEach(r => {
    const a = document.createElement("a");
    a.className = "repo"; a.href = "https://github.com/Wolfzzzzz/" + r.n;
    a.target = "_blank"; a.rel = "noopener";
    a.innerHTML = '<div class="card"><h3>' + r.n + '</h3><p>' + r.d + '</p></div>';
    grid.appendChild(a);
  });
  // active btn
  document.querySelectorAll("#langs button").forEach(b => b.classList.toggle("active", b.dataset.lang === lang));
  // restart typing
  startTyping(d.typed);
}

document.querySelectorAll("#langs button").forEach(b => {
  b.addEventListener("click", () => {
    CUR = b.dataset.lang;
    localStorage.setItem("wolf_lang", CUR);
    fadeSwap(() => applyLang(CUR));
  });
});

function fadeSwap(fn) {
  const c = document.getElementById("content");
  c.style.transition = "opacity .25s ease";
  c.style.opacity = "0";
  setTimeout(() => { fn(); c.style.opacity = "1"; }, 250);
}

/* ============ Typing ============ */
let typeTimer = null;
function startTyping(arr) {
  const el = document.getElementById("typed");
  clearInterval(typeTimer);
  let s = 0, i = 0, del = false;
  el.textContent = "";
  function tick() {
    const word = arr[s];
    if (!del) {
      el.textContent = word.slice(0, i++);
      if (i > word.length) { del = true; typeTimer = setTimeout(tick, 1400); return; }
    } else {
      el.textContent = word.slice(0, i--);
      if (i < 0) { del = false; s = (s + 1) % arr.length; i = 0; }
    }
    typeTimer = setTimeout(tick, del ? 45 : 90);
  }
  tick();
}

/* ============ Visitor counter ============ */
function animateCounter() {
  const el = document.getElementById("vcounter");
  const target = 100 + Math.floor(Math.random() * 900);
  let n = 0;
  const step = Math.max(1, Math.floor(target / 60));
  const t = setInterval(() => {
    n += step;
    if (n >= target) { n = target; clearInterval(t); }
    el.textContent = n.toLocaleString();
  }, 22);
}

/* ============ Reveal on scroll ============ */
const io = new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); } });
}, { threshold: 0.15 });
document.querySelectorAll(".reveal").forEach(el => io.observe(el));

/* ============ Particle network ============ */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
let W, H, pts;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  const count = Math.min(90, Math.floor(W * H / 16000));
  pts = Array.from({ length: count }, () => ({
    x: Math.random() * W, y: Math.random() * H,
    vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5
  }));
}
resize();
window.addEventListener("resize", resize);
let mx = -999, my = -999;
window.addEventListener("mousemove", e => { mx = e.clientX; my = e.clientY; });

function draw() {
  ctx.clearRect(0, 0, W, H);
  for (let i = 0; i < pts.length; i++) {
    const p = pts[i];
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0 || p.x > W) p.vx *= -1;
    if (p.y < 0 || p.y > H) p.vy *= -1;
    const dx = p.x - mx, dy = p.y - my, dist = Math.hypot(dx, dy);
    if (dist < 130) { p.x += dx / dist * 1.2; p.y += dy / dist * 1.2; }
    ctx.beginPath();
    ctx.arc(p.x, p.y, 1.8, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(88,166,255,0.8)";
    ctx.fill();
    for (let j = i + 1; j < pts.length; j++) {
      const q = pts[j], d = Math.hypot(p.x - q.x, p.y - q.y);
      if (d < 130) {
        ctx.beginPath();
        ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y);
        ctx.strokeStyle = "rgba(120,160,255," + (0.18 * (1 - d / 130)) + ")";
        ctx.lineWidth = 1; ctx.stroke();
      }
    }
  }
  requestAnimationFrame(draw);
}
draw();

/* ============ init ============ */
applyLang(CUR);
animateCounter();
</script>
