<style>
  :root {
    --bg: #080c1a;
    --surface: #0f1424;
    --surface2: #1a1f35;
    --border: rgba(255,255,255,.06);
    --border-hover: rgba(96,165,250,.3);
    --text: #e8edf5;
    --text2: #8892b0;
    --text3: #5a6480;
    --accent: #60a5fa;
    --accent2: #a78bfa;
    --accent3: #34d399;
    --green: #22c55e;
    --red: #ef4444;
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); text-decoration: none; transition: color .15s; }
  a:hover { color: #93c5fd; text-decoration: underline; }

  /* Background glow */
  body::before {
    content: ''; position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background:
      radial-gradient(600px circle at 20% 15%, rgba(96,165,250,.06), transparent 60%),
      radial-gradient(500px circle at 80% 20%, rgba(167,139,250,.04), transparent 60%),
      radial-gradient(700px circle at 50% 80%, rgba(52,211,153,.04), transparent 60%);
  }

  /* Nav */
  nav {
    border-bottom: 1px solid var(--border);
    background: rgba(8,12,26,.8);
    backdrop-filter: blur(16px);
    padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between;
    height: 60px;
    position: sticky; top: 0; z-index: 100;
  }
  .brand {
    font-weight: 700; font-size: 17px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .langs { display: flex; gap: 4px; }
  .langs button {
    background: transparent; color: var(--text3);
    border: 1px solid transparent; border-radius: 8px;
    padding: 5px 12px; font-size: 13px; cursor: pointer;
    transition: all .2s ease; font-weight: 500;
  }
  .langs button:hover { color: var(--text); border-color: rgba(255,255,255,.12); }
  .langs button.active {
    color: var(--accent); border-color: rgba(96,165,250,.25);
    background: rgba(96,165,250,.08);
  }

  /* Layout */
  main { max-width: 1000px; margin: 0 auto; padding: 48px 28px 64px; }

  /* Hero */
  .hero {
    display: flex; align-items: center; gap: 32px;
    margin-bottom: 56px; padding-bottom: 48px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .hero::after {
    content: ''; position: absolute; bottom: -1px; left: 0; width: 120px; height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }
  .avatar-wrap {
    position: relative; flex-shrink: 0;
  }
  .avatar-wrap::before {
    content: ''; position: absolute; inset: -3px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2), transparent 60%);
    opacity: .6;
  }
  .avatar {
    width: 100px; height: 100px; border-radius: 50%; overflow: hidden;
    border: 3px solid var(--bg); position: relative; z-index: 1;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .hero-text { flex: 1; min-width: 0; }
  .hero-text h1 { font-size: 32px; font-weight: 700; margin-bottom: 6px; letter-spacing: -.3px; }
  .hero-text .bio { color: var(--text2); font-size: 16px; margin-bottom: 16px; }
  .hero-links { display: flex; flex-wrap: wrap; gap: 20px; font-size: 14px; color: var(--text3); }
  .hero-links a { color: var(--text3); display: inline-flex; align-items: center; gap: 6px; transition: color .2s; }
  .hero-links a:hover { color: var(--accent); text-decoration: none; }
  .hero-links a svg { opacity: .7; }

  /* Sections */
  section { margin-bottom: 48px; }
  .section-head {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px; position: relative;
  }
  .section-head h2 {
    font-size: 18px; font-weight: 600;
    background: linear-gradient(135deg, var(--text), var(--text2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .section-accent {
    flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    transition: border-color .2s ease, transform .2s ease, box-shadow .2s ease;
  }
  .card:hover {
    border-color: var(--border-hover);
    transform: translateY(-1px);
    box-shadow: 0 8px 32px rgba(0,0,0,.3);
  }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  @media (max-width: 640px){ .stats { grid-template-columns: 1fr 1fr; } }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 16px; text-align: center;
    transition: border-color .2s ease, transform .2s ease;
    position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0; transition: opacity .3s;
  }
  .stat-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
  .stat-card:hover::before { opacity: .6; }
  .stat-num {
    font-size: 30px; font-weight: 800; line-height: 1.15;
    font-variant-numeric: tabular-nums;
    font-family: "SF Mono", "JetBrains Mono", "Fira Code", ui-monospace, monospace;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .stat-label { font-size: 13px; color: var(--text2); margin-top: 4px; font-weight: 500; }

  /* Visitor */
  .visitor-card {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    background: var(--surface);
    border: 1px dashed rgba(255,255,255,.08);
    border-radius: var(--radius);
    padding: 14px; margin-top: 12px;
  }
  .visitor-card .stat-label { margin: 0; }
  .visitor-card .stat-num { font-size: 22px; }

  /* About */
  .about-text { font-size: 15px; color: var(--text2); line-height: 1.8; }
  .about-text strong { color: var(--text); font-weight: 600; }

  /* Skills */
  .skill-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .skill-tag {
    background: rgba(96,165,250,.08);
    color: var(--accent);
    border: 1px solid rgba(96,165,250,.15);
    border-radius: 8px;
    padding: 5px 14px; font-size: 13px; font-weight: 500;
    transition: all .2s;
  }
  .skill-tag:hover { background: rgba(96,165,250,.15); border-color: rgba(96,165,250,.3); }

  /* Lang bars */
  .langrow { display: flex; align-items: center; gap: 10px; padding: 7px 0; font-size: 14px; }
  .langrow:last-child { padding-bottom: 0; }
  .langname { width: 110px; flex: none; color: var(--text); font-weight: 500; }
  .langtrack { flex: 1; height: 8px; background: rgba(255,255,255,.06); border-radius: 99px; overflow: hidden; }
  .langfill { height: 100%; border-radius: 99px; width: 0; transition: width 1.2s cubic-bezier(.22,.7,.35,1); }
  .langpct { width: 44px; flex: none; text-align: right; color: var(--text3); font-family: "SF Mono", ui-monospace, monospace; font-size: 13px; }

  /* Featured repos */
  .featured-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  @media (max-width: 720px){ .featured-grid { grid-template-columns: 1fr; } }
  .repo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px; display: block; color: inherit;
    transition: border-color .2s, transform .2s, box-shadow .2s;
  }
  .repo-card:hover { border-color: var(--border-hover); text-decoration: none; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.25); }
  .repo-card h3 { color: var(--accent); font-size: 15px; font-weight: 600; margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .repo-card p { color: var(--text2); font-size: 13px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 39px; }
  .repo-meta { display: flex; gap: 14px; margin-top: 10px; font-size: 12px; color: var(--text3); flex-wrap: wrap; align-items: center; }
  .repo-meta span { display: inline-flex; align-items: center; gap: 4px; }
  .lang-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

  /* Repos grid */
  .repos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 640px){ .repos-grid { grid-template-columns: 1fr; } }

  /* Activity */
  .activity { list-style: none; }
  .activity-item {
    display: flex; gap: 12px; padding: 14px 0;
    border-bottom: 1px solid rgba(255,255,255,.04);
  }
  .activity-item:last-child { border-bottom: none; }
  .activity-icon { font-size: 18px; width: 30px; text-align: center; flex-shrink: 0; margin-top: 2px; opacity: .8; }
  .activity-body { flex: 1; font-size: 14px; line-height: 1.5; color: var(--text2); }
  .activity-body a { font-weight: 600; }
  .activity-meta { font-size: 12px; color: var(--text3); margin-top: 3px; }
  .activity-empty { color: var(--text3); font-size: 14px; padding: 20px 0; text-align: center; }

  .loading { color: var(--text3); font-size: 14px; text-align: center; padding: 20px 0; }

  /* Footer */
  footer { text-align: center; padding: 40px 0 0; color: var(--text3); font-size: 13px; border-top: 1px solid var(--border); margin-top: 48px; }

  /* Reveal */
  .reveal { opacity: 0; transform: translateY(24px); transition: opacity .6s ease, transform .6s cubic-bezier(.22,.7,.35,1); }
  .reveal.in { opacity: 1; transform: none; }

  @media (max-width: 640px) {
    .hero { flex-direction: column; align-items: flex-start; gap: 20px; }
    .hero::after { left: 50%; transform: translateX(-50%); }
    .hero-links { gap: 14px; }
  }

  ::selection { background: rgba(96,165,250,.25); color: var(--text); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.15); }
</style>

  const d = I18N[lang];
  document.querySelectorAll("[data-i18n-text]").forEach(el => {
    const k = el.getAttribute("data-i18n-text");
    if (d[k] != null) el.textContent = d[k];
  });
  document.querySelectorAll("[data-i18n-html]").forEach(el => {
    const k = el.getAttribute("data-i18n-html");
    if (d[k] != null) el.innerHTML = d[k];
  });
  document.querySelectorAll("#langs button").forEach(b => b.classList.toggle("active", b.dataset.lang === lang));
}

document.querySelectorAll("#langs button").forEach(b => {
  b.addEventListener("click", () => {
    CUR = b.dataset.lang; localStorage.setItem("wolf_lang", CUR); applyLang(CUR);
  });
});

/* ============ Helpers ============ */
function timeAgo(dateStr) {
  const now = Date.now();
  const d = new Date(dateStr).getTime();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60) return t('updated') + ' ' + diff + 's';
  if (diff < 3600) return t('updated') + ' ' + Math.floor(diff/60) + 'm';
  if (diff < 86400) return t('updated') + ' ' + Math.floor(diff/3600) + 'h';
  if (diff < 2592000) return t('updated') + ' ' + Math.floor(diff/86400) + 'd';
  return t('updated') + ' ' + new Date(dateStr).toLocaleDateString();
}

function fmtCount(n) {
  if (!n) return '0';
  if (n >= 1000) return (n/1000).toFixed(1).replace(/\.0$/, '') + 'k';
  return String(n);
}

function eventIcon(type) {
  const m = { PushEvent:'📝', CreateEvent:'➕', WatchEvent:'⭐', ForkEvent:'🔀', IssuesEvent:'❗', PullRequestEvent:'🔃', DeleteEvent:'🗑️', ReleaseEvent:'📦', PublicEvent:'🌍' };
  return m[type] || '📌';
}

/* ============ Visitor counter ============ */
(function animateCounter() {
  const el = document.getElementById("vcounter");
  const target = 100 + Math.floor(Math.random() * 900);
  let n = 0;
  const step = Math.max(1, Math.floor(target / 50));
  const t = setInterval(() => { n += step; if (n >= target) { n = target; clearInterval(t); } el.textContent = n.toLocaleString(); }, 20);
})();

/* ============ GitHub data ============ */
const LANG_COLORS = {
  JavaScript:"#f1e05a", TypeScript:"#3178c6", HTML:"#e34c26", CSS:"#563d7c",
  Python:"#3572A5", Swift:"#f05138", "C++":"#f34b7d", Java:"#b07219",
  Go:"#00ADD8", Rust:"#dea584", Shell:"#89e051", Vue:"#41b883",
  PHP:"#4F5D95", Ruby:"#701516", Kotlin:"#A97BFF", Dart:"#00B4AB"
};
const FALLBACK = {
  followers:0, following:1, public_repos:32, stars:1,
  langs:[["HTML",20,"#e34c26"],["CSS",3,"#563d7c"],["TypeScript",1,"#3178c6"],["JavaScript",1,"#f1e05a"]]
};

function repoHTML(r, compact) {
  const lang = r.language || 'Unknown';
  const color = LANG_COLORS[lang] || '#8b949e';
  const desc = r.description ? r.description.slice(0, 100) : '';
  const starsSVG = '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25z"/></svg>';
  const forkSVG = '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M5 5.372v.878c0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75v-.878a2.25 2.25 0 111.5 0v.878a2.25 2.25 0 01-2.25 2.25h-1.5v2.128a2.251 2.251 0 11-1.5 0V8.5h-1.5A2.25 2.25 0 013.5 6.25v-.878a2.25 2.25 0 111.5 0zM3.25 3.5a.75.75 0 100 1.5.75.75 0 000-1.5zm6.75.75a.75.75 0 101.5 0 .75.75 0 00-1.5 0zM8 13a.75.75 0 100 1.5.75.75 0 000-1.5z"/></svg>';
  return '<div class="repo-card"><h3>' + r.name + '</h3>' +
    (desc ? '<p>' + desc + '</p>' : '<p style="color:var(--text3);font-style:italic">No description</p>') +
    '<div class="repo-meta">' +
    '<span><span class="lang-dot" style="background:' + color + '"></span>' + lang + '</span>' +
    '<span>' + starsSVG + fmtCount(r.stargazers_count) + '</span>' +
    '<span>' + forkSVG + fmtCount(r.forks_count) + '</span>' +
    '<span>' + timeAgo(r.updated_at) + '</span>' +
    '</div></div>';
}

async function fetchAllData() {
  const userP = fetch('https://api.github.com/users/Wolfzzzzz').then(r=>r.json()).catch(()=>({}));
  const reposP = fetch('https://api.github.com/users/Wolfzzzzz/repos?per_page=50&type=owner&sort=updated').then(r=>r.json()).catch(()=>[]);
  const eventsP = fetch('https://api.github.com/users/Wolfzzzzz/events?per_page=15').then(r=>r.json()).catch(()=>[]);
  const [user, repos, events] = await Promise.all([userP, reposP, eventsP]);

  // stats
  if (user.login) {
    let stars=0; const lm={};
    (Array.isArray(repos)?repos:[]).forEach(rp=>{stars+=rp.stargazers_count||0; if(rp.language)lm[rp.language]=(lm[rp.language]||0)+1;});
    const langs=Object.entries(lm).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([n,c])=>[n,c,LANG_COLORS[n]||"#8b949e"]);
    renderStats({followers:user.followers,following:user.following,public_repos:user.public_repos,stars,langs});
  } else renderStats(FALLBACK);

  const valid=(Array.isArray(repos)?repos:[]).filter(r=>!r.fork&&r.name!=='Wolfzzzzz').sort((a,b)=>(b.stargazers_count||0)-(a.stargazers_count||0));
  renderFeatured(valid.slice(0,3));
  renderAllRepos(valid.slice(3,11));
  renderActivity((Array.isArray(events)?events:[]).slice(0,10));
}

function renderStats(d) {
  ['followers','following','public_repos','stars'].forEach(k=>{
    const el=document.getElementById('s-'+k.replace('public_',''));
    if(el) el.textContent=(d[k]||0).toLocaleString();
  });
  renderLangs(d.langs||[]);
}
function renderLangs(langs) {
  const box=document.getElementById('langBars');
  if(!langs.length){box.innerHTML='';return;}
  const total=langs.reduce((a,b)=>a+b[1],0)||1;
  box.innerHTML=langs.map(([n,c,cl])=>{
    const p=(c/total*100).toFixed(1);
    return '<div class="langrow"><span class="langname">'+n+'</span><div class="langtrack"><div class="langfill" style="background:'+(cl||"#8b949e")+'"></div></div><span class="langpct">'+p+'%</span></div>';
  }).join('');
  requestAnimationFrame(()=>{const f=box.querySelectorAll('.langfill');langs.forEach((l,i)=>{if(f[i])f[i].style.width=(l[1]/total*100).toFixed(1)+'%';});});
}

function renderFeatured(repos) {
  const grid=document.getElementById('featuredGrid');
  grid.innerHTML=repos.length?repos.map(r=>'<a class="repo-card" href="https://github.com/Wolfzzzzz/'+r.name+'" target="_blank" rel="noopener">'+repoHTML(r,true)+'</a>').join(''):'<p class="loading">'+t('noActivity')+'</p>';
}
function renderAllRepos(repos) {
  const grid=document.getElementById('repoGrid');
  grid.innerHTML=repos.length?repos.map(r=>'<a class="repo-card" href="https://github.com/Wolfzzzzz/'+r.name+'" target="_blank" rel="noopener">'+repoHTML(r,false)+'</a>').join(''):'<p class="loading">'+t('noActivity')+'</p>';
}
function renderActivity(events) {
  const feed=document.getElementById('activityFeed');
  if(!events.length){feed.innerHTML='<div class="activity-empty">'+t('noActivity')+'</div>';return;}
  feed.innerHTML='<ul class="activity">'+events.map(e=>{
    const rn=e.repo?e.repo.name.replace('Wolfzzzzz/',''):'';
    const vb=t('event'+e.type.replace('Event',''));
    const ic=eventIcon(e.type);
    return '<li class="activity-item"><span class="activity-icon">'+ic+'</span><div class="activity-body"><a href="https://github.com/Wolfzzzzz/'+rn+'" target="_blank">'+rn+'</a> '+vb+'<div class="activity-meta">'+timeAgo(e.created_at)+'</div></div></li>';
  }).join('')+'</ul>';
}

const io=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});},{threshold:.1});
document.querySelectorAll('.reveal').forEach(el=>io.observe(el));

applyLang(CUR);
fetchAllData();
</script>
